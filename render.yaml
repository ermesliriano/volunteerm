services:
  - type: web
    name: volunteerm
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --access-logfile - --error-logfile -

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: SECRET_KEY
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: DATABASE_URL
        sync: false

      - key: ADMIN_EMAILS
        sync: false
